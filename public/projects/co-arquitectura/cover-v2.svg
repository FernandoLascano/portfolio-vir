<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#d8d2c5" stroke-width="1"/>
    </pattern>
    <style>
      .co-shape { fill: #5c292a; }
      .inner-text { fill: #f0ebe3; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.12em; }
      .manual-text { fill: #5c292a; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; letter-spacing: 0.35em; font-size: 18px; opacity: 0.75; }
    </style>
  </defs>

  <!-- Cream/paper background (matches brand) -->
  <rect width="1200" height="900" fill="#f0ebe3"/>

  <!-- Subtle grid pattern overlay -->
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.45"/>

  <!-- Bordó accent corner (top-right) -->
  <rect x="1140" y="0" width="60" height="40" fill="#5c292a"/>

  <!-- CO Arquitectura logo, centered (viewBox 0 0 445.87 187.71 → scaled & placed at 377,360) -->
  <g transform="translate(377, 360)">
    <!-- C shape (rectangle with rounded left side) -->
    <path class="co-shape" d="M148.14.59h-59.08C39.87.59,0,40.47,0,89.65h0c0,49.19,39.87,89.06,89.06,89.06h59.08V.59Z"/>
    <!-- O shape (ellipse) -->
    <ellipse class="co-shape" cx="247.26" cy="89.71" rx="95.24" ry="89.71"/>

    <!-- Text inside the O, in cream -->
    <text class="inner-text" x="247.26" y="98" text-anchor="middle" font-size="14">ARQUITECTURA</text>
    <rect x="220" y="106" width="55" height="2.5" fill="#f0ebe3"/>
    <text class="inner-text" x="247.26" y="128" text-anchor="middle" font-size="14">QUE ACOMPAÑA</text>
  </g>

  <!-- "MANUAL DE IDENTIDAD VISUAL" text below logo -->
  <text x="600" y="610" text-anchor="middle" class="manual-text">MANUAL DE IDENTIDAD VISUAL</text>
</svg>

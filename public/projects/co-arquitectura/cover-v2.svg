<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#d8d2c5" stroke-width="1"/>
    </pattern>
    <style>
      .co-shape { fill: #5c292a; }
      .co-text { fill: #5c292a; }
      .manual-text { fill: #5c292a; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; letter-spacing: 0.35em; font-size: 18px; opacity: 0.75; }
    </style>
  </defs>

  <!-- Cream/paper background (matches brand) -->
  <rect width="1200" height="900" fill="#f0ebe3"/>

  <!-- Subtle grid pattern overlay -->
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.45"/>

  <!-- Bordó accent corner (top-right) -->
  <rect x="1140" y="0" width="60" height="40" fill="#5c292a"/>

  <!-- CO Arquitectura logo, centered -->
  <g transform="translate(377, 360)">
    <path class="co-shape" d="M148.14.59h-59.08C39.87.59,0,40.47,0,89.65h0c0,49.19,39.87,89.06,89.06,89.06h59.08V.59Z"/>
    <ellipse class="co-shape" cx="247.26" cy="89.71" rx="95.24" ry="89.71"/>
    <text class="co-text" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="13.55px" transform="translate(256.19 159.02) rotate(-.61) scale(1.11 1)"><tspan x="0" y="0">A</tspan><tspan x="10.37" y="0" style="letter-spacing:0.06em">R</tspan><tspan x="20.65" y="0">QUI</tspan><tspan x="51.77" y="0">TECTURA </tspan></text>
    <rect class="co-shape" x="323.07" y="181.07" width="69.79" height="6.65"/>
    <text class="co-text" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="13px" transform="translate(315.45 174.57) scale(1.06 1)"><tspan x="0" y="0" xml:space="preserve"> QUE </tspan><tspan x="40.99" y="0" style="letter-spacing:0.05em">A</tspan><tspan x="50.67" y="0">COM</tspan><tspan x="84.1" y="0" style="letter-spacing:0em">P</tspan><tspan x="92.64" y="0">AÑA</tspan></text>
  </g>

  <!-- "MANUAL DE IDENTIDAD VISUAL" text below logo -->
  <text x="600" y="610" text-anchor="middle" class="manual-text">MANUAL DE IDENTIDAD VISUAL</text>
</svg>

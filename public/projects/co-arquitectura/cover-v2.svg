<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#d8d2c5" stroke-width="1"/>
    </pattern>
    <style>
      .manual-text { fill: #5c292a; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; letter-spacing: 0.35em; font-size: 22px; opacity: 0.8; }
    </style>
  </defs>

  <!-- Cream/paper background -->
  <rect width="1200" height="900" fill="#f0ebe3"/>

  <!-- Subtle grid pattern overlay -->
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.45"/>

  <!-- Bordó accent corner (top-right) -->
  <rect x="1140" y="0" width="60" height="40" fill="#5c292a"/>

  <!-- Official CO Arquitectura logo, embedded verbatim (445.87 x 187.71 → scaled & placed centered) -->
  <svg x="280" y="320" width="640" height="269.3" viewBox="0 0 445.87 187.71" preserveAspectRatio="xMidYMid meet" overflow="visible">
    <!-- C shape -->
    <path fill="#5c292a" d="M148.14.59h-59.08C39.87.59,0,40.47,0,89.65h0c0,49.19,39.87,89.06,89.06,89.06h59.08V.59Z"/>
    <!-- O shape -->
    <ellipse fill="#5c292a" cx="247.26" cy="89.71" rx="95.24" ry="89.71"/>
    <!-- "ARQUITECTURA" text (ARQUI cream inside O, TECTURA bordó outside) -->
    <text font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="13.55" transform="translate(256.19 159.02) rotate(-.61) scale(1.11 1)"><tspan fill="#f0ebe3" x="0" y="0" style="letter-spacing:0.07em">A</tspan><tspan fill="#f0ebe3" x="10.37" y="0" style="letter-spacing:0.06em">R</tspan><tspan fill="#f0ebe3" x="20.65" y="0" style="letter-spacing:0.07em">QUI</tspan><tspan fill="#5c292a" x="51.77" y="0" style="letter-spacing:0.07em">TECTURA </tspan></text>
    <!-- Underline rectangle (bordó) outside O -->
    <rect fill="#5c292a" x="323.07" y="181.07" width="69.79" height="6.65"/>
    <!-- "QUE ACOMPAÑA" text (bordó) outside O -->
    <text fill="#5c292a" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="13" transform="translate(315.45 174.57) scale(1.06 1)"><tspan x="0" y="0" xml:space="preserve" style="letter-spacing:0.07em"> QUE </tspan><tspan x="40.99" y="0" style="letter-spacing:0.05em">A</tspan><tspan x="50.67" y="0" style="letter-spacing:0.07em">COM</tspan><tspan x="84.1" y="0" style="letter-spacing:0em">P</tspan><tspan x="92.64" y="0" style="letter-spacing:0.07em">AÑA</tspan></text>
  </svg>

  <!-- "MANUAL DE IDENTIDAD VISUAL" text below logo -->
  <text x="600" y="680" text-anchor="middle" class="manual-text">MANUAL DE IDENTIDAD VISUAL</text>
</svg>

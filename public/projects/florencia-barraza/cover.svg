<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Tone-on-tone half-circle pattern -->
    <pattern id="halfcircles" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="#6f1d28"/>
      <circle cx="0" cy="60" r="50" fill="#7d2530" opacity="0.7"/>
      <circle cx="120" cy="60" r="50" fill="#7d2530" opacity="0.7"/>
      <circle cx="60" cy="0" r="50" fill="#5e1822" opacity="0.5"/>
      <circle cx="60" cy="120" r="50" fill="#5e1822" opacity="0.5"/>
    </pattern>
    <!-- Rose-gold gradient for the monogram -->
    <linearGradient id="rosegold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c9b8"/>
      <stop offset="35%" stop-color="#d4a795"/>
      <stop offset="60%" stop-color="#c4937f"/>
      <stop offset="100%" stop-color="#a87968"/>
    </linearGradient>
    <style>
      .name-text { fill: #e8c9b8; font-family: 'Times New Roman', Georgia, serif; font-weight: 400; letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- Burgundy patterned background -->
  <rect width="1200" height="900" fill="url(#halfcircles)"/>

  <!-- Subtle vignette overlay -->
  <rect width="1200" height="900" fill="#6f1d28" opacity="0.25"/>

  <!-- FBB monogram (elegant serif), centered -->
  <g transform="translate(600, 410)" text-anchor="middle">
    <!-- F -->
    <text x="-130" y="0" fill="url(#rosegold)" font-family="'Times New Roman', Georgia, serif" font-weight="400" font-size="240" font-style="italic">F</text>
    <!-- B (overlapping center) -->
    <text x="0" y="0" fill="url(#rosegold)" font-family="'Times New Roman', Georgia, serif" font-weight="400" font-size="280" font-style="italic">B</text>
    <!-- B (right, slightly smaller) -->
    <text x="130" y="0" fill="url(#rosegold)" font-family="'Times New Roman', Georgia, serif" font-weight="400" font-size="240" font-style="italic">B</text>
  </g>

  <!-- Name -->
  <text x="600" y="600" text-anchor="middle" class="name-text" font-size="28">FLORENCIA BARRAZA BRAVINO</text>
  <!-- Role -->
  <text x="600" y="640" text-anchor="middle" class="name-text" font-size="16" opacity="0.85">ABOGADA · MP. 1-2222</text>
</svg>
